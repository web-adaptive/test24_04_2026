version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./laravel-app:/var/www/html
    ports:
      - "8000:80"

  node:
    image: node:18
    working_dir: /var/www/html
    volumes:
      - ./laravel-app:/var/www/html
    command: sh -c "npm install && npm run watch"
